<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
</head>

<body>
    <main>
        <div id="main" class="main">
            <div id="start-screen" class="start-screen">
                <h1 class="game-title">BATTLESHIP</h1>
                <div id="battle-select" class="battle-select">
                    <div id="left-card" class="card">
                        <div class="top-card">
                            <h3 class="select-title">VS COMPUTER</h3>
                            <p class="select-subtitle">Play against computer</p>
                        </div>
                        <div class="bottom-card inactive">
                            <input type="text" name="player-name-comp" id="player-name-comp"
                                placeholder="Your name (optional)">
                            <button class="start-game-btn" id="start-game-comp-btn">START GAME</button>
                            <p class="input-subtext">Leave empty for a random name</p>
                        </div>
                    </div>
                    <div id="right-card" class="card">
                        <div class="top-card">
                            <h3 class="select-title">VS FRIEND</h3>
                            <p class="select-subtitle">Play online against friend</p>
                        </div>
                        <div class="bottom-card inactive">
                            <input type="text" name="player-name-online" id="player-name-online"
                                placeholder="Your name (optional)">
                            <button class="start-game-btn" id="start-game-online-btn">START GAME</button>
                            <p class="input-subtext">Leave empty for a random name</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>

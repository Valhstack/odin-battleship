<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
</head>

<body>
    <main>
        <div id="main" class="main">
            <div id="start-screen" class="start-screen">
                <h1 class="game-title">BATTLESHIP</h1>
                <div id="battle-select" class="battle-select">
                    <div id="left-card" class="card">
                        <div class="top-card">
                            <h3 class="select-title">VS COMPUTER</h3>
                            <p class="select-subtitle">Play against computer</p>
                        </div>
                        <div class="bottom-card inactive">
                            <input type="text" name="player-name-comp" id="player-name-comp"
                                placeholder="Your name (optional)">
                            <button class="start-game-btn" id="start-game-comp-btn">START GAME</button>
                            <p class="input-subtext">Leave empty for a random name</p>
                        </div>
                    </div>
                    <div id="right-card" class="card">
                        <div class="top-card">
                            <h3 class="select-title">VS FRIEND</h3>
                            <p class="select-subtitle">Play online against friend</p>
                        </div>
                        <div class="bottom-card inactive">
                            <input type="text" name="player-name-online" id="player-name-online"
                                placeholder="Your name (optional)">
                            <button class="start-game-btn" id="start-game-online-btn">START GAME</button>
                            <p class="input-subtext">Leave empty for a random name</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="boards-screen" class="boards-screen inactive">
                <div class="board-wrapper">
                    <h3 id="user-name" class="name"><span id="user-name-text"></span> • <span id="user-turn"
                            class="active-turn">YOUR TURN</span></h3>
                    <h3 class="board-title">YOUR FLEET</h3>
                    <div id="player-board" class="board"></div>
                    <div class="player-board-buttons-wrapper" id="player-board-buttons-wrapper">
                        <button id="generate-ships-placement-btn">Generate ships placement</button>
                        <button id="drag-and-drop-ships-btn">Drag & drop ships</button>
                    </div>
                </div>
                <div class="board-wrapper">
                    <h3 id="comp-name" class="name"><span id="comp-name-text"></span> • <span id="comp-turn"
                            class="inactive-turn">WAITING</span></h3>
                    <h3 class="board-title">ENEMY WATERS</h3>
                    <div id="enemy-board" class="board"></div>
                </div>
            </div>

            <dialog id="winner-announcement">
                <div class="winner-announcement-wrapper">
                    <h4 id="result" class="result"></h4>
                    <p id="result-subtext" class="result-subtext"></p>
                    <div class="announcement-buttons-wrapper">
                        <button id="play-again-btn">PLAY AGAIN</button>
                        <button id="exit-btn">EXIT</button>
                    </div>
                </div>
            </dialog>
        </div>
    </main>
</body>

</html>
